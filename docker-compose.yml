

services:
  postgres:
    image: postgres:16-alpine
    container_name: medreminder-postgres
    environment:
      POSTGRES_DB: medreminder
      POSTGRES_USER: medreminder
      POSTGRES_PASSWORD: medreminder123
    volumes:
      - pg_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U medreminder -d medreminder"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: medreminder-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: medreminder-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  createbuckets:
    image: minio/mc
    container_name: medreminder-createbuckets
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      /usr/bin/mc alias set myminio http://minio:9000 minioadmin minioadmin123;
      /usr/bin/mc mb myminio/medreminder || true;
      /usr/bin/mc policy set public myminio/medreminder;
      exit 0;
      "

  api:
    build:
      context: .
      dockerfile: infra/docker/api.Dockerfile
    container_name: medreminder-api
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://medreminder:medreminder123@postgres:5432/medreminder
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-dev-jwt-secret}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-dev-refresh-secret}
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 4000
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_USE_SSL: "false"
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin123
      MINIO_BUCKET_NAME: medreminder
    ports:
      - "4000:4000"
    volumes:
      - ./services/api:/app
      - /app/node_modules
    command: npm run dev

  ai-engine:
    build:
      context: .
      dockerfile: infra/docker/ai.Dockerfile
    container_name: medreminder-ai
    ports:
      - "8000:8000"
    volumes:
      - ./services/ai-engine:/app
    environment:
      - PYTHONUNBUFFERED=1

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: medreminder-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@medreminder.com
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - "5050:80"
    depends_on:
      - postgres

  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: medreminder-redis-commander
    environment:
      - REDIS_HOSTS=local:redis:6379
    ports:
      - "8081:8081"
    depends_on:
      - redis

volumes:
  pg_data:
  redis_data:
  minio_data:
